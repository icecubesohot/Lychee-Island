<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF9F6">
<title>小岛 ☁️</title>
<link rel="manifest" href="data:application/json,{}">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root {
    /* Base Color System - 极简灰调与米色底噪 */
    --bg: #FAF9F6;
    --surface: #FFFFFF;
    --surface-2: #F4F3EE;
    --surface-3: #EAE8E1;
    --text: #2B2927;
    --text-2: #6E6A64;
    --text-3: #A39E96;
    --border: #EDECE6;
    --border-2: #F5F4EE;
    
    /* Premium Shadows & Blur */
    --shadow-sm: 0 2px 8px rgba(43,41,39,0.02);
    --shadow: 0 4px 24px rgba(43,41,39,0.04);
    --shadow-lg: 0 12px 40px rgba(43,41,39,0.08);
    --radius: 24px;
    --radius-sm: 14px;
    
    /* Typography System */
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Noto Sans SC', sans-serif;
    --font-serif: 'Noto Serif SC', serif;
    --font-display: 'Ma Shan Zheng', cursive;

    /* Module Color System - 低饱和、现代灰调、克制的高级感 */
    --home-primary: #D9D4CF;
    --home-bg: #F6EFEF;
    
    --sleep-primary: #C7D3DD;
    --sleep-bg: #EEF2F5;
    
    --diet-primary: #EAD7C5;
    --diet-bg: #FFF7F0;
    
    --leisure-primary: #C7D4C8;
    --leisure-bg: #EEF3EE;
    
    --beauty-primary: #DCCEDB;
    --beauty-bg: #F6F1F5;
    
    --study-primary: #C8D3DE;
    --study-bg: #F8FAFC;
    
    --exercise-primary: #C2D4C7;
    --exercise-bg: #F1F6F2;
    
    --big-primary: #E4DDD3;
    --big-bg: #FAF5EE;
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0;
    letter-spacing: -0.01em;
  }

  /* 核心修复：终结 100vh 锁死导致的全局与半屏滚动 Bug */
  html { 
    height: -webkit-fill-available;
    background-color: var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    max-width: 430px;
    margin: 0 auto;
    /* 使用 dynamic dvh 与 fill-available 确保全屏自然滚动 */
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #root { 
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* 现代高级卡片 */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease;
  }

  .card-sm {
    background: var(--surface);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-2);
  }

  /* 丝滑高级过渡动画 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { transform: scale(0.97); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes floatSlow {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-4px); }
  }

  .page-enter { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .modal-enter { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .card-enter { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .float-anim { animation: floatSlow 6s ease-in-out infinite; }

  /* 适配安全区域的底部内边距，确保不遮挡任何内容 */
  .pb-nav { padding-bottom: calc(92px + env(safe-area-inset-bottom, 16px)); }

  /* 隐藏原生滚动条，保持绝对纯净的界面 */
  ::-webkit-scrollbar { width: 0px; height: 0px; display: none; }

  /* 表单与交互元素 iOS 化重构 */
  input, textarea, select {
    font-family: var(--font-sans);
    outline: none;
    -webkit-appearance: none;
    letter-spacing: 0em;
  }

  button { 
    -webkit-tap-highlight-color: transparent; 
    cursor: pointer; 
    border: none; 
    background: none; 
    font-family: var(--font-sans); 
  }

  img { -webkit-user-drag: none; user-select: none; }

  /* 点阵与视觉提示器 */
  .timeline-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--surface-3);
    flex-shrink: 0;
    margin-top: 7px;
  }
  
  .text-serif {
    font-family: var(--font-serif);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ============================================================
// 现代自然文案与高阶数据定义
// ============================================================
const QUOTES = [
  "今天也在认真生活。",
  "慢慢来，每一步都算数。",
  "把今天活成自己喜欢的样子。",
  "不必完美，但要真实。",
  "呼吸一下，一切都还好。",
  "生活里有很多细小的美好。",
  "每一个平淡的日子，都值得被记录。",
  "走慢一点，看看周围的世界。",
  "记录下来，这些都是你的故事。",
  "温柔地对待自己，就像对待老朋友。",
];

const MOODS = [
  { e: '🥰', label: '愉悦' }, { e: '😊', label: '平静' }, { e: '😌', label: '放松' },
  { e: '✨', label: '明朗' }, { e: '🌸', label: '温和' }, { e: '🌙', label: '克制' },
  { e: '😴', label: '困倦' }, { e: '🤗', label: '充实' }, { e: '😔', label: '低落' },
  { e: '☁️', label: '放空' },
];

const MODULES = [
  { id: 'sleep',    name: 'Sleep',    emoji: '🌙', color: 'var(--sleep-primary)',    bg: 'var(--sleep-bg)'    },
  { id: 'diet',     name: 'Diet',     emoji: ' Bento', color: 'var(--diet-primary)',     bg: 'var(--diet-bg)'     },
  { id: 'leisure',  name: 'Leisure',  emoji: '🌿', color: 'var(--leisure-primary)',  bg: 'var(--leisure-bg)'  },
  { id: 'study',    name: 'Learning', emoji: '📖', color: 'var(--study-primary)',    bg: 'var(--study-bg)'    },
  { id: 'exercise', name: 'Fitness',  emoji: '🌸', color: 'var(--exercise-primary)', bg: 'var(--exercise-bg)' },
];

// ============================================================
// 数据持久化层
// ============================================================
const DB = {
  get:    (k, def = [])   => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set:    (k, v)          => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  getOne: (k, def = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
};

const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayStr  = ()    => new Date().toISOString().slice(0, 10);
const fmtDate   = (iso) => { const d = new Date(iso); return `${d.getMonth()+1}月${d.getDate()}日`; };
const fmtTime   = (iso) => { const d = new Date(iso); return d.toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'}); };
const fmtDT     = (iso) => `${fmtDate(iso)} ${fmtTime(iso)}`;

// ============================================================
// Design System 统一高级 UI 组件
// ============================================================

const Empty = ({ emoji='🌿', text='暂无记录' }) => (
  <div style={{color:'var(--text-3)'}} className="flex flex-col items-center py-16 gap-2 select-none">
    <div className="text-3xl float-anim mb-1" style={{opacity: 0.7}}>{emoji}</div>
    <p style={{fontSize: 13, fontWeight: 400, letterSpacing: '0.02em'}}>{text}</p>
  </div>
);

const Tag = ({ children, color='var(--text-2)', bg }) => (
  <span style={{
    background: bg || (color + '12'), 
    color: color,
    fontSize: 11, 
    padding: '3px 10px',
    borderRadius: 8, 
    fontWeight: 500,
    display: 'inline-flex',
    alignItems: 'center'
  }}>{children}</span>
);

const Btn = ({ children, onClick, variant='outline', size='md', fullWidth, style: sx = {}, disabled }) => {
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
    borderRadius: 14, fontWeight: 500, transition: 'all 0.2s cubic-bezier(0.16, 1, 0.3, 1)', 
    cursor: disabled ? 'not-allowed' : 'pointer',
    opacity: disabled ? 0.4 : 1, fontFamily: 'var(--font-sans)',
    width: fullWidth ? '100%' : undefined,
    fontSize: size === 'sm' ? 12 : 13,
    padding: size === 'sm' ? '6px 14px' : '12px 24px',
    letterSpacing: '0.01em'
  };
  const variants = {
    primary: { background: 'var(--text)', color: 'var(--surface)', boxShadow: '0 4px 12px rgba(0,0,0,0.05)' },
    outline: { background: 'var(--surface)', color: 'var(--text-2)', border: '1px solid var(--border)' },
    ghost:   { background: 'transparent', color: 'var(--text-2)' },
    danger:  { background: '#FFF3F3', color: '#A06060' },
    soft:    { background: 'var(--surface-2)', color: 'var(--text)' },
  };
  return (
    <button onClick={disabled ? undefined : onClick}
      style={{ ...base, ...variants[variant], ...sx }}
      onPointerDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
      onPointerUp={e => e.currentTarget.style.transform = 'scale(1)'}
    >{children}</button>
  );
};

const Field = ({ label, value, onChange, type='text', placeholder='', rows, hint }) => (
  <div style={{display:'flex', flexDirection:'column', gap:6}} className="w-full">
    {label && <label style={{color:'var(--text-2)', fontSize:12, fontWeight:500}}>{label}</label>}
    {rows ? (
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        rows={rows} style={{
          background:'var(--surface-2)', border:'1px solid transparent',
          color:'var(--text)', borderRadius:14, padding:'12px 16px', fontSize:14,
          resize:'none', lineHeight:1.6, width:'100%', transition: 'all 0.2s'
        }} onFocus={e=>e.target.style.border='1px solid var(--text-3)'} onBlur={e=>e.target.style.border='1px solid transparent'} />
    ) : (
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{
          background:'var(--surface-2)', border:'1px solid transparent',
          color:'var(--text)', borderRadius:14, padding:'12px 16px', fontSize:14, width:'100%', transition: 'all 0.2s'
        }} onFocus={e=>e.target.style.border='1px solid var(--text-3)'} onBlur={e=>e.target.style.border='1px solid transparent'} />
    )}
    {hint && <span style={{color:'var(--text-3)', fontSize:11}}>{hint}</span>}
  </div>
);

const Stars = ({ value, onChange, color='var(--text-2)', count=5, readonly=false }) => (
  <div style={{display:'flex', gap:4}}>
    {Array.from({length:count}, (_,i) => (
      <button key={i} onClick={readonly ? undefined : ()=>onChange(i+1)}
        style={{
          fontSize: 18, 
          color: i < value ? color : 'var(--surface-3)', 
          transition: 'transform 0.15s ease',
          cursor: readonly ? 'default' : 'pointer'
        }}
      >★</button>
    ))}
  </div>
);

const Dots = ({ value, onChange, color='var(--text-2)', count=5, readonly=false }) => (
  <div style={{display:'flex', gap:6, alignItems:'center'}}>
    {Array.from({length:count}, (_,i) => (
      <button key={i} onClick={readonly ? undefined : ()=>onChange(i+1)} style={{
        width: 8, height: 8, borderRadius: '50%',
        background: i < value ? color : 'var(--surface-3)',
        transition: 'all 0.2s cubic-bezier(0.16, 1, 0.3, 1)',
        cursor: readonly ? 'default' : 'pointer'
      }} />
    ))}
  </div>
);

const Sheet = ({ open, onClose, title, children }) => {
  if (!open) return null;
  return (
    <div style={{
      position:'fixed', inset:0, zIndex:200,
      background:'rgba(27,26,25,0.25)', backdropFilter:'blur(10px)',
      display:'flex', alignItems:'flex-end',
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-enter" style={{
        width:'100%', maxWidth:430, margin:'0 auto',
        background:'var(--surface)',
        borderRadius:'28px 28px 0 0',
        maxHeight:'88vh', overflowY:'auto',
        padding:'8px 24px calc(40px + env(safe-area-inset-bottom, 16px))',
        boxShadow: 'var(--shadow-lg)'
      }}>
        <div style={{ width:36, height:4, background:'var(--surface-3)', borderRadius:2, margin:'10px auto 24px' }} />
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24}}>
          <h3 style={{fontSize:16, fontWeight:600, color:'var(--text)'}}>{title}</h3>
          <button onClick={onClose} style={{
            color:'var(--text-3)', fontSize:16, width:24, height:24, borderRadius:'50%',
            background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center',
          }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
};

const SegmentPicker = ({ options, value, onChange, color='var(--text)' }) => (
  <div style={{ display:'flex', gap:6, flexWrap:'wrap', background:'var(--surface-2)', padding:4, borderRadius:14 }}>
    {options.map(opt => {
      const active = (typeof opt === 'object' ? opt.value : opt) === value;
      const label  = typeof opt === 'object' ? opt.label : opt;
      const val    = typeof opt === 'object' ? opt.value : opt;
      return (
        <button key={val} onClick={()=>onChange(val)} style={{
          flex: 1, textOrigin: 'center', textAlign: 'center',
          padding:'8px 12px', borderRadius:10, fontSize:12, fontWeight: 500,
          background: active ? 'var(--surface)' : 'transparent',
          color:      active ? color : 'var(--text-2)',
          boxShadow:  active ? 'var(--shadow-sm)' : 'none',
          transition: 'all 0.2s cubic-bezier(0.16, 1, 0.3, 1)',
        }}>{label}</button>
      );
    })}
  </div>
);

const RecordCard = ({ children, onDelete, accentColor, style: sx={} }) => (
  <div className="card" style={{padding:'20px', ...sx, borderLeft:`4px solid ${accentColor || 'var(--border)'}`}}>
    <div style={{display:'flex', gap:12, justifyContent:'space-between', alignItems:'flex-start'}}>
      <div style={{flex:1, minWidth:0}} className="flex flex-col gap-2">{children}</div>
      <button onClick={onDelete} style={{
        color:'var(--text-3)', width:20, height:20, borderRadius:'50%',
        background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center',
        fontSize: 11, flexShrink: 0, marginTop: -2
      }}>✕</button>
    </div>
  </div>
);

const TimeStamp = ({ iso }) => (
  <span style={{color:'var(--text-3)', fontSize:11, fontWeight: 400}}>{fmtDT(iso)}</span>
);

// ============================================================
// 现代通用模块头部导航
// ============================================================
const ModuleHeader = ({ emoji, title, accent, bg, onBack, extra }) => (
  <div style={{
    position:'sticky', top:0, zIndex:50,
    background: bg || 'var(--bg)',
    borderBottom:`1px solid ${accent}40`,
    backdropFilter:'blur(20px)',
    padding:'54px 24px 16px',
    display:'flex', alignItems:'center', gap:12,
  }}>
    <button onClick={onBack} style={{
      color:'var(--text)', fontSize:20, display:'flex', alignItems:'center', justifyContent:'center',
      width:32, height:32, borderRadius:10, background:'rgba(255,255,255,0.6)',
      boxShadow: 'var(--shadow-sm)'
    }}>‹</button>
    <div className="flex items-center gap-1.5">
      <h1 style={{fontSize:17, fontWeight:600, color:'var(--text)'}}>{title}</h1>
    </div>
    <div style={{marginLeft:'auto'}}>{extra}</div>
  </div>
);

// ============================================================
// Bottom Navigation iPhone Dock 半透明微光设计
// ============================================================
const BottomNav = ({ page, setPage }) => {
  const tabs = [
    { id:'home',        emoji:'🏠', label:'首页'  },
    { id:'sleep',       emoji:'🌙', label:'Sleep'  },
    { id:'diet',        emoji:'🍱', label:'Diet'  },
    { id:'leisure',     emoji:'🌿', label:'Leisure'  },
    { id:'somethingbig',emoji:'🌟', label:'Sth big'   },
  ];
  return (
    <div style={{
      position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)',
      width:'100%', maxWidth:430, zIndex:100,
      background:'rgba(255,255,255,0.72)',
      backdropFilter:'blur(20px)',
      borderTop:'1px solid rgba(43,41,39,0.05)',
      paddingBottom:'calc(env(safe-area-inset-bottom, 16px) - 4px)',
    }}>
      <div style={{ display:'flex', justifyContent:'space-around', alignItems:'center', height:64, padding:'0 16px' }}>
        {tabs.map(t => {
          const active = page === t.id || (t.id === 'leisure' && page === 'beauty');
          return (
            <button key={t.id} onClick={()=>setPage(t.id)} style={{
              display:'flex', flexDirection:'column', alignItems:'center', gap:4,
              padding:'6px 0', width: 64, borderRadius:12,
              transition:'all 0.25s cubic-bezier(0.16, 1, 0.3, 1)',
            }}>
              <span style={{fontSize: 18, opacity: active ? 1 : 0.4, transform: active ? 'scale(1.05)' : 'scale(1)', transition: 'all 0.2s'}}>{t.emoji}</span>
              <span style={{
                fontSize: 10, lineHeight:1,
                color: active ? 'var(--text)' : 'var(--text-3)',
                fontWeight: active ? 600 : 400,
              }}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
};

// ============================================================
// Dashboard (首页)
// ============================================================
const Dashboard = ({ setPage, records }) => {
  const [now, setNow]   = useState(new Date());
  const [quote]         = useState(() => QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  const [mood, setMood] = useState(() => DB.getOne('mood_' + todayStr(), ''));
  const [showMood, setShowMood]     = useState(false);
  const [todos, setTodos]           = useState(() => DB.get('todos', []));
  const [newTodo, setNewTodo]       = useState('');
  const [addingTodo, setAddingTodo] = useState(false);
  const todoRef = useRef(null);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  const dateLabel = () => {
    const days = ['周日','周一','周二','周三','周四','周五','周六'];
    return `${now.getFullYear()} / ${now.getMonth()+1} / ${now.getDate()} ${days[now.getDay()]}`;
  };
  const timeLabel = () => now.toLocaleTimeString('zh', {hour:'2-digit', minute:'2-digit'});
  const todayCount = (id) => (records[id]||[]).filter(r => r.createdAt?.slice(0,10)===todayStr()).length;

  const pickMood = (e) => {
    setMood(e); DB.set('mood_' + todayStr(), e); setShowMood(false);
  };

  const addTodo = () => {
    if (!newTodo.trim()) return;
    const t = { id:genId(), text:newTodo.trim(), done:false, createdAt:new Date().toISOString() };
    const next = [t, ...todos];
    setTodos(next); DB.set('todos', next);
    setNewTodo(''); setAddingTodo(false);
  };

  const toggleTodo = (id) => {
    const next = todos.map(t => t.id===id ? {...t,done:!t.done} : t);
    setTodos(next); DB.set('todos', next);
  };

  const deleteTodo = (id) => {
    const next = todos.filter(t => t.id!==id);
    setTodos(next); DB.set('todos', next);
  };

  const pendingCount = todos.filter(t=>!t.done).length;

  return (
    <div style={{minHeight:'100dvh', background:'var(--bg)'}}>
      <div style={{padding:'64px 24px 0'}} className="pb-nav page-enter">

        {/* 时间与呼吸感头部 */}
        <div style={{marginBottom: 32}}>
          <p style={{color:'var(--text-3)', fontSize:12, fontWeight: 500, marginBottom:6, letterSpacing: '0.05em'}}>{dateLabel()}</p>
          <div style={{
            fontFamily:'var(--font-sans)', fontSize:38, fontWeight: 300, lineHeight:1.1,
            color:'var(--text)', marginBottom:12, letterSpacing:'-0.03em'
          }}>{timeLabel()}</div>
          <p className="text-serif" style={{color:'var(--text-2)', fontSize:14, lineHeight:1.7, opacity: 0.85}}>{quote}</p>
        </div>

        {/* 心情状态舱 */}
        <div className="card" style={{
          padding:'16px 20px', marginBottom:20,
          display:'flex', alignItems:'center', justifyContent:'space-between',
        }}>
          <div className="flex items-center gap-3">
            <div style={{fontSize: 26, width:44, height:44, borderRadius:12, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center'}}>{mood || '🌸'}</div>
            <div>
              <p style={{color:'var(--text-3)', fontSize:11, marginBottom:2}}>今日状态</p>
              <p style={{fontSize:13, fontWeight:500, color:'var(--text)'}}>{mood ? '心境已记录' : '此刻感觉如何？'}</p>
            </div>
          </div>
          <Btn onClick={()=>setShowMood(!showMood)} variant='soft' size='sm' style={{borderRadius: 10}}>
            {mood ? '重选' : '记录'}
          </Btn>
        </div>

        {showMood && (
          <div className="card card-enter" style={{padding:'18px', marginBottom:20, background:'var(--surface)'}}>
            <div style={{display:'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap:10}}>
              {MOODS.map(m => (
                <button key={m.e} onClick={()=>pickMood(m.e)} style={{
                  display:'flex', flexDirection:'column', alignItems:'center', gap:4,
                  padding:'10px 0', borderRadius:12,
                  background: mood===m.e ? 'var(--surface-2)' : 'transparent',
                }}>
                  <span style={{fontSize:22}}>{m.e}</span>
                  <span style={{color:'var(--text-2)', fontSize:11}}>{m.label}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* 现代模块网格系统 */}
        <p style={{color:'var(--text-3)', fontSize:11, fontWeight:600, marginBottom:12, letterSpacing: '0.05em'}}>TODAY'S LOG</p>
        <div style={{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8, marginBottom:28}}>
          {MODULES.map(m => {
            const cnt = todayCount(m.id);
            return (
              <button key={m.id} onClick={()=>setPage(m.id)} style={{
                display:'flex', flexDirection:'column', alignItems:'center',
                gap:6, padding:'14px 4px 12px',
                borderRadius: 16, background: m.bg,
                position:'relative',
              }}
              onPointerDown={e=>e.currentTarget.style.transform='scale(0.95)'}
              onPointerUp={e=>e.currentTarget.style.transform='scale(1)'}
              >
                <span style={{fontSize:18}}>{m.emoji}</span>
                <span style={{color:'var(--text-2)', fontSize:11, fontWeight:500}}>{m.name}</span>
                {cnt > 0 && (
                  <div style={{
                    position:'absolute', top:-4, right:-4,
                    background:'var(--text)', color:'var(--surface)',
                    minWidth:16, height:16, padding: '0 4px', borderRadius:8,
                    fontSize:9, fontWeight:600,
                    display:'flex', alignItems:'center', justifyContent:'center'
                  }}>{cnt}</div>
                )}
              </button>
            );
          })}
        </div>

        {/* 极简待办事项 */}
        <div className="card" style={{padding:'20px', marginBottom:20}}>
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16}}>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <span style={{fontSize:14, fontWeight:600, color:'var(--text)'}}>今日聚焦</span>
              {pendingCount > 0 && (
                <span style={{
                  background:'var(--surface-3)', color:'var(--text-2)',
                  fontSize:10, padding:'2px 6px', borderRadius:6, fontWeight:500
                }}>{pendingCount}</span>
              )}
            </div>
            <button onClick={()=>{setAddingTodo(true);setTimeout(()=>todoRef.current?.focus(),50)}}
              style={{
                width:24, height:24, borderRadius:'50%',
                background:'var(--surface-2)', color:'var(--text)',
                fontSize:14, display:'flex', alignItems:'center', justifyContent:'center'
              }}>+</button>
          </div>

          {addingTodo && (
            <div style={{display:'flex', gap:8, marginBottom:16}} className="card-enter">
              <input ref={todoRef} value={newTodo} onChange={e=>setNewTodo(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')addTodo();if(e.key==='Escape')setAddingTodo(false);}}
                placeholder="添加一件核心事项..."
                style={{
                  flex:1, background:'var(--surface-2)', border:'none',
                  borderRadius:12, padding:'10px 14px', fontSize:13, color:'var(--text)',
                }} />
              <Btn onClick={addTodo} variant='primary' size='sm' style={{borderRadius:12}}>确定</Btn>
            </div>
          )}

          {todos.length === 0 ? (
            <Empty emoji='📝' text='暂无待办，享受当下' />
          ) : (
            <div style={{display:'flex', flexDirection:'column', gap:2}}>
              {todos.map((t, i) => (
                <div key={t.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0' }}>
                  <button onClick={()=>toggleTodo(t.id)} style={{
                    width:18, height:18, borderRadius:6, flexShrink:0,
                    background: t.done ? 'var(--text-2)' : 'transparent',
                    border: t.done ? 'none' : '1.5px solid var(--surface-3)',
                    color:'#fff', fontSize:10,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    transition:'all 0.15s'
                  }}>{t.done && '✓'}</button>
                  <span style={{
                    flex:1, fontSize:13, color: t.done ? 'var(--text-3)' : 'var(--text)',
                    textDecoration: t.done ? 'line-through' : 'none', lineHeight:1.5
                  }}>{t.text}</span>
                  <button onClick={()=>deleteTodo(t.id)} style={{ color:'var(--text-3)', fontSize:14, opacity:0.6 }}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Something Big 现代高阶质感卡片 */}
        <button onClick={()=>setPage('somethingbig')} className="card" style={{
          width:'100%', padding:'20px',
          display:'flex', alignItems:'center', gap:16,
          marginBottom:24, textAlign: 'left'
        }}
        onPointerDown={e=>e.currentTarget.style.transform='scale(0.99)'}
        onPointerUp={e=>e.currentTarget.style.transform='scale(1)'}>
          <div style={{
            width:44, height:44, borderRadius:14, flexShrink:0,
            background:'var(--big-bg)', border: '1px solid var(--big-primary)',
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:18
          }}>🌟</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14, fontWeight:600, color:'var(--text)', marginBottom:2}}>Something Big</div>
            <div style={{fontSize:12, color:'var(--text-3)'}}>愿望 · 闪光灵感 · 深度长文碎念</div>
          </div>
          <span style={{color:'var(--text-3)', fontSize:16}}>›</span>
        </button>

      </div>
    </div>
  );
};

// ============================================================
// Sleep (睡眠) 模块
// ============================================================
const SleepModule = ({ onBack, records, addRecord, deleteRecord }) => {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({
    type:'sleep', bedtime:'', sleepTime:'', status:'', activity:'', wakeTime:'', quality:3, feeling:'', notes:''
  });
  const f = (k, v) => setForm(prev => ({...prev, [k]:v}));
  const save = () => {
    addRecord('sleep', {...form});
    setOpen(false);
    setForm({type:'sleep',bedtime:'',sleepTime:'',status:'',activity:'',wakeTime:'',quality:3,feeling:'',notes:''});
  };

  return (
    <div className="page-enter" style={{minHeight:'100dvh', background:'var(--sleep-bg)'}}>
      <ModuleHeader emoji='🌙' title='Sleep' accent='var(--sleep-primary)' bg='var(--sleep-bg)' onBack={onBack}
        extra={<Btn onClick={()=>setOpen(true)} variant='primary' size='sm'>+ 记录</Btn>}
      />
      <div style={{padding:'20px'}} className="pb-nav">
        {records.length===0 ? <Empty emoji='🌙' text='记录睡眠，感受身体的静息节奏' /> : (
          <div style={{display:'flex', flexDirection:'column', gap:12}}>
            {records.map(r => (
              <RecordCard key={r.id} accentColor='var(--sleep-primary)' onDelete={()=>deleteRecord('sleep',r.id)}>
                <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                  <Tag color='var(--text-2)' bg='var(--surface)'>{r.type==='sleep' ? '🌙 入睡准备' : '☀️ 晨醒起床'}</Tag>
                  <TimeStamp iso={r.createdAt} />
                </div>
                {r.type==='sleep' ? (<>
                  {r.bedtime    && <p style={{fontSize:13, color:'var(--text)', fontWeight: 500}}>计划时间：{r.bedtime}</p>}
                  {(r.status || r.activity) && (
                    <p style={{fontSize:12, color:'var(--text-2)'}}>
                      {[r.status, r.activity].filter(Boolean).join(' · ')}
                    </p>
                  )}
                </>) : (<>
                  {r.wakeTime && <p style={{fontSize:13, color:'var(--text)', fontWeight:500}}>醒来时间：{r.wakeTime}</p>}
                  <div className="my-0.5"><Stars value={r.quality||3} onChange={()=>{}} color='var(--text-2)' readonly /></div>
                  {r.feeling  && <p style={{fontSize:12, color:'var(--text-2)'}}>{r.feeling}</p>}
                </>)}
                {r.notes && <p className="text-serif" style={{ fontSize:12, color:'var(--text-2)', marginTop:6, borderLeft:'2px solid var(--sleep-primary)', paddingLeft:8, fontStyle: 'italic' }}>"{r.notes}"</p>}
              </RecordCard>
            ))}
          </div>
        )}
      </div>

      <Sheet open={open} onClose={()=>setOpen(false)} title='睡眠小记'>
        <SegmentPicker color='var(--text)'
          options={[{value:'sleep',label:'🌙 入睡准备'},{value:'wakeup',label:'☀️ 起床晨醒'}]}
          value={form.type} onChange={v=>f('type',v)}
        />
        <div style={{display:'flex', flexDirection:'column', gap:16, marginTop:20}}>
          {form.type==='sleep' ? (<>
            <Field label='计划入睡时间' value={form.bedtime} onChange={v=>f('bedtime',v)} type='time' />
            <Field label='当前身心状态' value={form.status} onChange={v=>f('status',v)} placeholder='平静 / 脑中杂绪 / 极度疲惫...' />
            <Field label='睡前静态活动' value={form.activity} onChange={v=>f('activity',v)} placeholder='翻阅书本 / 冥想 / 听颂钵音乐...' />
          </>) : (<>
            <Field label='晨醒时间' value={form.wakeTime} onChange={v=>f('wakeTime',v)} type='time' />
            <div>
              <p style={{color:'var(--text-2)', fontSize:12, fontWeight:500, marginBottom:8}}>睡眠质量评价</p>
              <Stars value={form.quality} onChange={v=>f('quality',v)} />
            </div>
            <Field label='清醒后第一感受' value={form.feeling} onChange={v=>f('feeling',v)} placeholder='神清气爽 / 身体沉重 / 梦境清晰...' />
          </>)}
          <Field label='备注与梦境复盘' value={form.notes} onChange={v=>f('notes',v)} placeholder='浮现的灵感或残存的梦境...' rows={3} />
          <Btn onClick={save} variant='primary' fullWidth>完成保存</Btn>
        </div>
      </Sheet>
    </div>
  );
};

// Diet (饮食) 模块

];

const DietModule = ({ onBack, records, addRecord, deleteRecord }) => {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({ mealType:'lunch', food:'', satiety:3, mood:'😊', evaluation:'', notes:'' });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  const save = () => {
    addRecord('diet', {...form});

                </div>
                {r.evaluation && <p style={{fontSize:12, color:'var(--text-2)'}}>{r.evaluation}</p>}

          <div>
            <p style={{color:'var(--text-2)', fontSize:12, fontWeight:500, marginBottom:8}}>饱腹感感应</p>
            <Dots value={form.satiety} onChange={v=>f('satiety',v)} />

          <div>
            <p style={{color:'var(--text-2)', fontSize:12, fontWeight:500, marginBottom:8}}>就餐时的情绪</p>
            <div style={{display:'flex', gap:10}}>
              {MOODS.slice(0,5).map(m => (
                <button key={m.e} onClick={()=>f('mood',m.e)} style={{
                  fontSize:20, padding:'6px 10px', borderRadius:10,

};

// ============================================================
// Leisure (休闲) 与 Beauty (美丽手记) 模块
// ============================================================
const LEISURE_TYPES = [
  {value:'ai',       label:'AI探索',   emoji:'🤖'}, {value:'game',     label:'游戏',     emoji:'🎮'},
  {value:'guitar',   label:'乐器',     emoji:'🎸'}, {value:'anime',    label:'创作',     emoji:'✨'},
  {value:'video',    label:'流媒体',   emoji:'📱'}, {value:'walk',     label:'户外散步',   emoji:'🚶'},
  {value:'music',    label:'聆听音乐',   emoji:'🎵'}, {value:'daydream', label:'纯粹放空',   emoji:'☁️'},
  {value:'read',     label:'自由阅读',   emoji:'📚'},
];

const LeisureModule = ({ onBack, records, addRecord, deleteRecord }) => {
  const [tab, setTab]       = useState('leisure');
  const [open, setOpen]     = useState(false);
  const [form, setForm]     = useState({type:'walk', duration:'', feeling:'', notes:''});

  const [beauty, setBeauty]      = useState(() => DB.get('beauty', []));
  const [beautyOpen, setBO]      = useState(false);
  const [bf, setBf]              = useState({btype:'makeup', name:'', products:'', evaluation:'', notes:''});
  const bfu = (k,v) => setBf(p=>({...p,[k]:v}));

  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  const save = () => {
    addRecord('leisure', {...form});
    setOpen(false);
    setForm({type:'walk',duration:'',feeling:'',notes:''});
  };

  const saveBeauty = () => {
    if (!bf.name && !bf.evaluation && !bf.notes) return;
    const r = {id:genId(), ...bf, createdAt:new Date().toISOString()};
    const next = [r, ...beauty];
    setBeauty(next); DB.set('beauty', next);
    setBO(false);
    setBf({btype:'makeup',name:'',products:'',evaluation:'',notes:''});
  };

  const delBeauty = (id) => {
    const next = beauty.filter(r=>r.id!==id);
    setBeauty(next); DB.set('beauty', next);
  };

  const leisureEmoji = v => LEISURE_TYPES.find(t=>t.value===v)?.emoji || '🌿';
  const leisureLabel = v => LEISURE_TYPES.find(t=>t.value===v)?.label || v;

  return (
    <div className="page-enter" style={{minHeight:'100dvh', background: tab==='leisure' ? 'var(--leisure-bg)' : 'var(--beauty-bg)'}}>
      <ModuleHeader 
        emoji='🌿' 
        title={tab==='leisure' ? 'Leisure' : 'Beauty'} 
        accent={tab==='leisure' ? 'var(--leisure-primary)' : 'var(--beauty-primary)'} 
        bg={tab==='leisure' ? 'var(--leisure-bg)' : 'var(--beauty-bg)'} 
        onBack={onBack}
        extra={<Btn onClick={()=>tab==='leisure' ? setOpen(true) : setBO(true)} variant='primary' size='sm'>+ 记录</Btn>}
      />
      <div style={{padding:'16px 24px 4px'}}>
        <SegmentPicker color='var(--text)'
          options={[{value:'leisure',label:'Leisure 休闲时光'},{value:'beauty',label:'💄 Beauty 美丽手记'}]}
          value={tab} onChange={setTab}
        />
      </div>
      <div style={{padding:'16px 24px'}} className="pb-nav">
        {tab==='leisure' ? (
          records.length===0 ? <Empty emoji='🌿' text='记录消磨时光的温柔切片' /> : (
            <div style={{display:'flex', flexDirection:'column', gap:12}}>
              {records.map(r => (
                <RecordCard key={r.id} accentColor='var(--leisure-primary)' onDelete={()=>deleteRecord('leisure',r.id)}>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <span style={{fontSize:14}}>{leisureEmoji(r.type)}</span>
                    <Tag color='var(--text-2)' bg='var(--surface)'>{leisureLabel(r.type)}</Tag>
                    {r.duration && <span style={{color:'var(--text-3)', fontSize:11, fontWeight:500}}>{r.duration} min</span>}
                    <TimeStamp iso={r.createdAt} />
                  </div>
                  {r.feeling && <p style={{fontSize:13, color:'var(--text-2)'}}>{r.feeling}</p>}
                  {r.notes && <p className="text-serif" style={{fontSize:12, color:'var(--text-3)', fontStyle:'italic'}}>"{r.notes}"</p>}
                </RecordCard>
              ))}
            </div>
          )
        ) : (
          beauty.length===0 ? <Empty emoji='💄' text='建立属于你的秩序与审美收藏馆' /> : (
            <div className="grid grid-cols-2 gap-3">
              {beauty.map(r => (
                <div key={r.id} className="card p-4 flex flex-col gap-2" style={{ background: 'var(--surface)' }}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <Tag color='var(--text-2)' bg='var(--surface-2)'>
                      {r.btype==='makeup' ? '妆容' : '風格'}
                    </Tag>
                    <button onClick={()=>delBeauty(r.id)} style={{color:'var(--text-3)', fontSize:12}}>✕</button>
                  </div>
                  {r.name && <p style={{fontSize:13, fontWeight:600, color:'var(--text)', lineHeight: 1.3}}>{r.name}</p>}
                  {r.products && <p style={{fontSize:11, color:'var(--text-3)'}}>{r.products}</p>}
                  {r.evaluation && <p style={{fontSize:12, color:'var(--text-2)', lineHeight: 1.4}}>{r.evaluation}</p>}
                  {r.notes && <p className="text-serif" style={{fontSize:11, color:'var(--text-3)', fontStyle:'italic'}}>"{r.notes}"</p>}
                  <p style={{fontSize:10, color:'var(--text-3)', marginTop:'auto', paddingTop: 4}}>{fmtDate(r.createdAt)}</p>
                </div>
              ))}
            </div>
          )
        )}
      </div>

      <Sheet open={open} onClose={()=>setOpen(false)} title='时光切片'>
        <SegmentPicker color='var(--text)'
          options={LEISURE_TYPES.map(t=>({value:t.value, label:`${t.emoji} ${t.label}`}))}
          value={form.type} onChange={v=>f('type',v)}
        />
        <div style={{display:'flex', flexDirection:'column', gap:16, marginTop:20}}>
          <Field label='沉浸时长（分钟）' value={form.duration} onChange={v=>f('duration',v)} type='number' placeholder='分钟' />
          <Field label='带来的内在心理能量' value={form.feeling} onChange={v=>f('feeling',v)} placeholder='彻底放松 / 恢复了秩序感...' />
          <Field label='随笔记录' value={form.notes} onChange={v=>f('notes',v)} placeholder='记录留下的思绪...' rows={2} />
          <Btn onClick={save} variant='primary' fullWidth>完成记录</Btn>
        </div>
      </Sheet>

      <Sheet open={beautyOpen} onClose={()=>setBO(false)} title='审美手记'>
        <SegmentPicker color='var(--text)'
          options={[{value:'makeup',label:'💄 今日妆容'},{value:'style',label:'✨ 风格收藏'}]}
          value={bf.btype} onChange={v=>bfu('btype',v)}
        />
        <div style={{display:'flex', flexDirection:'column', gap:16, marginTop:20}}>
          <Field label={bf.btype==='makeup' ? '妆容命名' : '风格策展关键词'}
            value={bf.name} onChange={v=>bfu('name',v)} placeholder={bf.btype==='makeup' ? '透亮清冷感...' : '精简胶囊穿搭 / 灰调大杂烩...'} />
          {bf.btype==='makeup' && (
            <Field label='爱用物品组合' value={bf.products} onChange={v=>bfu('products',v)} placeholder='口红、高光、香氛...' />
          )}
          <Field label='审美灵感评价' value={bf.evaluation} onChange={v=>bfu('evaluation',v)} placeholder='色调很衬肤色 / 干净且克制...' />
          <Field label='随想小记' value={bf.notes} onChange={v=>bfu('notes',v)} placeholder='计划下一次搭配...' rows={2} />
          <Btn onClick={saveBeauty} variant='primary' fullWidth>保存审美灵感</Btn>
        </div>
      </Sheet>
    </div>
  );
};

// ============================================================
// Learning (学习) 模块
// ============================================================
const StudyModule = ({ onBack, records, addRecord, deleteRecord }) => {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({stype:'study', subject:'', duration:'', feeling:'', notes:''});
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  const save = () => {
    addRecord('study', {...form});
    setOpen(false);
    setForm({stype:'study',subject:'',duration:'',feeling:'',notes:''});
  };

  return (
    <div className="page-enter" style={{minHeight:'100dvh', background:'var(--study-bg)'}}>
      <ModuleHeader emoji='📖' title='Learning' accent='var(--study-primary)' bg='var(--study-bg)' onBack={onBack}
        extra={<Btn onClick={()=>setOpen(true)} variant='primary' size='sm'>+ 记录</Btn>}
      />
      <div style={{padding:'20px'}} className="pb-nav">
        {records.length===0 ? <Empty emoji='📖' text='安静向内生长，不为外界焦虑' /> : (
          <div style={{display:'flex', flexDirection:'column', gap:12}}>
            {records.map(r => (
              <RecordCard key={r.id} accentColor='var(--study-primary)' onDelete={()=>deleteRecord('study',r.id)}>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <Tag color='var(--text-2)' bg='var(--surface)'>{r.stype==='reading' ? '📚 深度阅读' : r.stype==='course' ? '🎓 专业研究' : '📖 自主探索'}</Tag>
                  {r.duration && <span style={{color:'var(--text-3)', fontSize:11, fontWeight:500}}>{r.duration} min</span>}
                  <TimeStamp iso={r.createdAt} />
                </div>
                {r.subject && <p style={{fontSize:14, fontWeight:600, color:'var(--text)'}}>{r.subject}</p>}
                {r.feeling && <p style={{fontSize:12, color:'var(--text-2)'}}>{r.feeling}</p>}
                {r.notes && (
                  <div style={{ background:'var(--surface-2)', borderLeft:'2px solid var(--text-2)', padding:'10px 14px', borderRadius:'0 10px 10px 0', marginTop:2 }}>
                    <p style={{fontSize:12, color:'var(--text)', lineHeight:1.6}}>{r.notes}</p>
                  </div>
                )}
              </RecordCard>
            ))}
          </div>
        )}
      </div>

      <Sheet open={open} onClose={()=>setOpen(false)} title='成长日志'>
        <SegmentPicker color='var(--text)'
          options={[{value:'study',label:'📖 自主探索'},{value:'reading',label:'📚 深度阅读'},{value:'course',label:'🎓 专业研究'}]}
          value={form.stype} onChange={v=>f('stype',v)}
        />
        <div style={{display:'flex', flexDirection:'column', gap:16, marginTop:20}}>
          <Field label='探索的主题或书目' value={form.subject} onChange={v=>f('subject',v)} placeholder='输入知识体系、文献或书目...' />
          <Field label='专心投入时长（分钟）' value={form.duration} onChange={v=>f('duration',v)} type='number' placeholder='分钟' />
          <Field label='心流体悟' value={form.feeling} onChange={v=>f('feeling',v)} placeholder='进入心流状态 / 思维逻辑被打通...' />
          <Field label='核心知识摘要 / 精彩摘录' value={form.notes} onChange={v=>f('notes',v)} placeholder='沉淀核心思绪...' rows={4} />
          <Btn onClick={save} variant='primary' fullWidth>沉淀入库</Btn>
        </div>
      </Sheet>
    </div>
  );
};

// ============================================================
// Fitness (运动) 模块
// ============================================================
const EX_TYPES = [

  {value:'yoga',    label:'静态瑜伽',  emoji:'🧘'}, {value:'gym',     label:'力量训练',  emoji:'💪'},
  {value:'swim',    label:'温水游泳',  emoji:'🏊'}, {value:'dance',   label:'身体律动',  emoji:'💃'},
  {value:'stretch', label:'筋膜拉伸',  emoji:'🌸'}, {value:'bike',    label:'户外骑行',  emoji:'🚴'},
];

const ExerciseModule = ({ onBack, records, addRecord, deleteRecord }) => {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({etype:'walk', duration:'', feeling:'', bodyStatus:'', notes:''});
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  const save = () => {
    addRecord('exercise', {...form});
    setOpen(false);
    setForm({etype:'walk',duration:'',feeling:'',bodyStatus:'',notes:''});
  };

  return (
    <div className="page-enter" style={{minHeight:'100dvh', background:'var(--exercise-bg)'}}>
      <ModuleHeader emoji='🌸' title='Fitness' accent='var(--exercise-primary)' bg='var(--exercise-bg)' onBack={onBack}
        extra={<Btn onClick={()=>setOpen(true)} variant='primary' size='sm'>+ 记录</Btn>}
      />
      <div style={{padding:'20px'}} className="pb-nav">
        {records.length===0 ? <Empty emoji='🌸' text='唤醒身体与多巴胺，循序渐进' /> : (

                  </div>

                  {r.feeling && <p className="text-serif" style={{ fontSize:13, color:'var(--text-2)', fontStyle:'italic' }}>"{r.feeling}"</p>}
                  {r.notes && <p style={{fontSize:12, color:'var(--text-3)'}}>{r.notes}</p>}

// ============================================================
// Something Big (自由沉淀) 模块
// ============================================================
const BIG_TYPES = [
  {value:'wish',    label:'🌟 愿望清单'}, {value:'finance', label:'💰 财务规划'},
  {value:'job',     label:'💼 斜杠探索'}, {value:'life',    label:'🌈 人生宏图'},
  {value:'travel',  label:'🗺️ 旅居向往'}, {value:'diary',   label:'📝 深度碎念'},
];

const SomethingBig = ({ onBack, records, addRecord, deleteRecord }) => {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({btype:'wish', title:'', content:''});
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  const save = () => {
    if (!form.content && !form.title) return;
    addRecord('somethingbig', {...form});
    setOpen(false);
    setForm({btype:'wish',title:'',content:''});
  };
  const typeLabel = v => BIG_TYPES.find(t=>t.value===v)?.label || v;

  return (
    <div className="page-enter" style={{minHeight:'100dvh', background:'var(--big-bg)'}}>
      <ModuleHeader emoji='🌟' title='Sth big' accent='var(--big-primary)' bg='var(--big-bg)' onBack={onBack}
        extra={<Btn onClick={()=>setOpen(true)} variant='primary' size='sm'>+ 记录灵感</Btn>}
      />
      <div style={{padding:'20px'}} className="pb-nav">
        {records.length===0 ? (
          <Empty emoji='🌟' text='一个完全去标签化的、完全属于你的深度独立空间' />
        ) : (
          <div className="grid grid-cols-1 gap-4">
            {records.map((r,i) => (
              <div key={r.id} className="card card-enter p-5 flex flex-col gap-3" style={{
                background: 'var(--surface)',
                borderTop:`4px solid var(--text-2)`
              }}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <Tag color='var(--text)' bg='var(--surface-2)'>
                    {typeLabel(r.btype)}
                  </Tag>
                  <button onClick={()=>deleteRecord('somethingbig',r.id)} style={{color:'var(--text-3)', fontSize:12}}>✕</button>
                </div>
                {r.title && <p style={{fontSize:15, fontWeight:600, color:'var(--text)', lineHeight:1.4}}>{r.title}</p>}
                {r.content && <p className="text-serif" style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.7, wordBreak:'break-all', whiteSpace: 'pre-wrap' }}>{r.content}</p>}
                <p style={{fontSize:11, color:'var(--text-3)', marginTop: 4}}>{fmtDT(r.createdAt)}</p>
              </div>
            ))}
          </div>
        )}
      </div>

      <Sheet open={open} onClose={()=>setOpen(false)} title='构建宏大想法'>
        <SegmentPicker color='var(--text)' options={BIG_TYPES} value={form.btype} onChange={v=>f('btype',v)} />
        <div style={{display:'flex', flexDirection:'column', gap:16, marginTop:20}}>
          <Field label='构想主题 (可选)' value={form.title} onChange={v=>f('title',v)} placeholder='给它起个名字...' />
          <Field label='展开叙述你的宏大想法 / 理财 / 碎碎念' value={form.content} onChange={v=>f('content',v)} placeholder='笔墨铺展，尽情构思...' rows={7} />
          <Btn onClick={save} variant='primary' fullWidth>安全存入脑海</Btn>
        </div>
      </Sheet>
    </div>
  );
};

// ============================================================
// Main Application Core Entry
// ============================================================
const App = () => {
  const [page, setPage] = useState('home');

  const [records, setRecords] = useState(() => ({
    sleep:        DB.get('records_sleep',        []),
    diet:         DB.get('records_diet',         []),
    leisure:      DB.get('records_leisure',      []),
    study:        DB.get('records_study',        []),
    exercise:     DB.get('records_exercise',     []),
    somethingbig: DB.get('records_somethingbig', []),
  }));

  const addRecord = (cat, data) => {
    const rec = { id:genId(), category:cat, ...data, images:[], createdAt:new Date().toISOString() };
    setRecords(prev => {
      const next = { ...prev, [cat]: [rec, ...(prev[cat]||[])] };
      DB.set('records_' + cat, next[cat]);
      return next;
    });
  };

  const deleteRecord = (cat, id) => {
    setRecords(prev => {
      const next = { ...prev, [cat]: prev[cat].filter(r=>r.id!==id) };
      DB.set('records_' + cat, next[cat]);
      return next;
    });
  };

  const goBack = () => setPage('home');

  const renderPage = () => {
    switch(page) {
      case 'home':        return <Dashboard setPage={setPage} records={records} />;
      case 'sleep':       return <SleepModule    onBack={goBack} records={records.sleep}        addRecord={addRecord} deleteRecord={deleteRecord} />;
      case 'diet':        return <DietModule      onBack={goBack} records={records.diet}         addRecord={addRecord} deleteRecord={deleteRecord} />;
      case 'beauty':
      case 'leisure':     return <LeisureModule   onBack={goBack} records={records.leisure}      addRecord={addRecord} deleteRecord={deleteRecord} />;
      case 'study':       return <StudyModule      onBack={goBack} records={records.study}       addRecord={addRecord} deleteRecord={deleteRecord} />;
      case 'exercise':    return <ExerciseModule   onBack={goBack} records={records.exercise}    addRecord={addRecord} deleteRecord={deleteRecord} />;
      case 'somethingbig':return <SomethingBig     onBack={goBack} records={records.somethingbig} addRecord={addRecord} deleteRecord={deleteRecord} />;
      default: return null;
    }
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      {renderPage()}
      <BottomNav page={page} setPage={setPage} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
