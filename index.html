<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF9F6">
<title>小岛 ☁️</title>

<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%E5%B0%8F%E5%B3%B6%20%E2%98%81%EF%B8%8F%22%2C%22short_name%22%3A%22%E5%B0%8F%E5%B3%B6%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23FAF9F6%22%2C%22theme_color%22%3A%22%23FAF9F6%22%7D">

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
  :root {
    /* Base Color - 全局统一奶白/留白基调 */
    --bg: #FAF9F6;
    --surface: #FFFFFF;
    --surface-glass: rgba(255, 255, 255, 0.7);
    --text: #2B2927;
    --text-2: #6E6A64;
    --text-3: #B4ADA5;
    --border: #E8E5E0;
    
    /* Global Spacing & Radius */
    --radius: 28px;
    --radius-sm: 16px;
    --shadow: 0 4px 24px rgba(43, 41, 39, 0.04);
    --shadow-lg: 0 12px 40px rgba(43, 41, 39, 0.08);

    /* Module Theme Colors (Mood System) */
    --home-p: #D9D4CF; --home-bg: #F6EFEF;
    --sleep-p: #C7D3DD; --sleep-bg: #DCE5EC;
    --diet-p: #EAD7C5; --diet-bg: #F3E4D7;
    --leisure-p: #C7D4C8; --leisure-bg: #DCE6DD;
    --beauty-p: #DCCEDB; --beauty-bg: #E8DCE7;
    --study-p: #C8D3DE; --study-bg: #D8E2EC;
    --fitness-p: #C2D4C7; --fitness-bg: #D7E5DC;
    --big-p: #E4DDD3; --big-bg: #FAF5EE;
  }

  /* 核心修复：100dvh 视口高度锁定，杜绝半屏滚动 */
  html, body {
    height: 100%;
    min-height: 100dvh;
    background: var(--bg);
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    color: var(--text);
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }

  #root {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* 统一卡片质感 */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.6);
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* 局部氛围感：渐变遮罩 */
  .mood-header {
    background: linear-gradient(to bottom, var(--theme-bg), var(--bg));
    transition: all 0.5s ease;
  }

  /* Typography 优化 */
  h1, h2, h3 { font-weight: 600; letter-spacing: -0.02em; }
  p { line-height: 1.65; letter-spacing: 0.01em; }
  .font-display { font-family: 'Ma Shan Zheng', cursive; }

  /* 滚动修复 */
  .main-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: calc(100px + env(safe-area-inset-bottom, 16px));
  }

  /* 隐藏多余 UI */
  ::-webkit-scrollbar { display: none; }

  /* 动画 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .page-enter { animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

  /* iOS Dock 式底部导航 */
  .ios-dock {
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 398px;
    z-index: 100;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 8px 32px rgba(43, 41, 39, 0.08);
    display: flex;
    justify-content: space-around;
    padding: 8px;
  }

  /* Heatmap */
  .heatmap-cell {
    width: 10px; height: 10px; border-radius: 2px; transition: background 0.3s;
  }

  /* Masonry */
  .masonry { columns: 2; gap: 12px; }
  .masonry-item { break-inside: avoid; margin-bottom: 12px; }

  /* 按钮触摸反馈 */
  button { -webkit-tap-highlight-color: transparent; outline: none; }
  button:active { transform: scale(0.96); transition: 0.1s; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// --- 数据层 ---
const DB = {
  get: (k, def = []) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  getOne: (k, def = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } }
};

const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayStr = () => new Date().toISOString().slice(0, 10);
const fmtTime = (iso) => new Date(iso).toLocaleTimeString('zh', {hour:'2-digit', minute:'2-digit'});

// --- 图片压缩 ---
const compressImage = (file) => new Promise((resolve) => {
  const reader = new FileReader(); reader.readAsDataURL(file);
  reader.onload = (e) => {
    const img = new Image(); img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800; let w = img.width, h = img.height;
      if (w > h && w > MAX) { h *= MAX/w; w = MAX; } else if (h > MAX) { w *= MAX/h; h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
  };
});

// ============================================================
// UI 原子组件
// ============================================================

const Btn = ({ children, onClick, variant='outline', fullWidth, style={} }) => {
  const variants = {
    primary: { background: 'var(--text)', color: '#fff' },
    outline: { border: '1px solid var(--border)', color: 'var(--text-2)' },
    soft: { background: 'var(--theme-bg)', color: 'var(--theme-p)' }
  };
  return (
    <button onClick={onClick} style={{
      display:'inline-flex', alignItems:'center', justifyContent:'center', padding:'12px 20px',
      borderRadius:16, fontWeight:500, fontSize:14, transition:'0.2s',
      width: fullWidth ? '100%' : 'auto', ...variants[variant], ...style
    }}>{children}</button>
  );
};

// ============================================================
// 核心模块
// ============================================================

const App = () => {
  const [page, setPage] = useState('home'); // home, sleep, diet, leisure, study, exercise, somethingbig
  const [tab, setTab] = useState('leisure'); // For Leisure/Beauty tab
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [previewImg, setPreviewImg] = useState(null);

  const [records, setRecords] = useState(() => ({
    sleep: DB.get('records_sleep'),
    diet: DB.get('records_diet'),
    leisure: DB.get('records_leisure'),
    study: DB.get('records_study'),
    exercise: DB.get('records_exercise'),
    somethingbig: DB.get('records_somethingbig'),
    beauty: DB.get('records_beauty')
  }));

  const [todos, setTodos] = useState(() => DB.get('todos'));

  // 动态主题系统
  const theme = useMemo(() => {
    const map = {
      home: { p: 'var(--home-p)', bg: 'var(--home-bg)', label: '首页' },
      sleep: { p: 'var(--sleep-p)', bg: 'var(--sleep-bg)', label: '睡眠' },
      diet: { p: 'var(--diet-p)', bg: 'var(--diet-bg)', label: '饮食' },
      leisure: { p: tab === 'beauty' ? 'var(--beauty-p)' : 'var(--leisure-p)', bg: tab === 'beauty' ? 'var(--beauty-bg)' : 'var(--leisure-bg)', label: tab === 'beauty' ? '审美' : '休闲' },
      study: { p: 'var(--study-p)', bg: 'var(--study-bg)', label: '学习' },
      exercise: { p: 'var(--fitness-p)', bg: 'var(--fitness-bg)', label: '身体' },
      somethingbig: { p: 'var(--big-p)', bg: 'var(--big-bg)', label: '人生' }
    };
    return map[page];
  }, [page, tab]);

  const addRecord = (cat, data) => {
    const rec = { id: genId(), category: cat, ...data, createdAt: new Date().toISOString() };
    const next = [rec, ...(records[cat] || [])];
    setRecords(prev => ({ ...prev, [cat]: next }));
    DB.set('records_' + cat, next);
  };

  const deleteRecord = (cat, id) => {
    const next = records[cat].filter(r => r.id !== id);
    setRecords(prev => ({ ...prev, [cat]: next }));
    DB.set('records_' + cat, next);
  };

  // --------------------------------------------------------
  // 子组件：图片系统
  // --------------------------------------------------------
  const ImageGrid = ({ images }) => {
    if (!images || images.length === 0) return null;
    return (
      <div className="grid grid-cols-2 gap-2 mt-3">
        {images.map((img, i) => (
          <div key={i} className="aspect-square rounded-xl overflow-hidden" onClick={(e) => { e.stopPropagation(); setPreviewImg(img); }}>
            <img src={img} className="w-full h-full object-cover" />
          </div>
        ))}
      </div>
    );
  };

  const ImageUploader = ({ images, setImages }) => {
    const onFile = async (e) => {
      const files = Array.from(e.target.files);
      const compressed = await Promise.all(files.map(f => compressImage(f)));
      setImages([...images, ...compressed]);
    };
    return (
      <div className="flex gap-2 flex-wrap mb-4">
        {images.map((img, i) => (
          <div key={i} className="w-16 h-16 rounded-lg overflow-hidden relative">
            <img src={img} className="w-full h-full object-cover" />
            <button className="absolute top-0 right-0 bg-black/40 text-white w-4 h-4 text-[10px]" onClick={()=>setImages(images.filter((_,idx)=>idx!==i))}>✕</button>
          </div>
        ))}
        {images.length < 4 && (
          <label className="w-16 h-16 rounded-lg bg-stone-100 flex items-center justify-center text-stone-400 text-xl">
            + <input type="file" multiple hidden onChange={onFile} />
          </label>
        )}
      </div>
    );
  };

  // --------------------------------------------------------
  // 子组件：Heatmap & Calendar
  // --------------------------------------------------------
  const Heatmap = () => {
    const days = 28;
    const data = useMemo(() => {
      const res = [];
      for(let i=days-1; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const iso = d.toISOString().slice(0,10);
        let count = 0;
        Object.keys(records).forEach(c => {
          (records[c]||[]).forEach(r => { if(r.createdAt.startsWith(iso)) count++; });
        });
        res.push({ date: iso, count });
      }
      return res;
    }, [records]);

    return (
      <div className="flex gap-1 justify-between px-2">
        {data.map(d => (
          <div key={d.date} className="heatmap-cell" style={{ 
            background: d.count === 0 ? '#F0EFEA' : `rgba(196,168,130, ${Math.min(d.count * 0.2 + 0.2, 1)})`
          }} />
        ))}
      </div>
    );
  };

  // --------------------------------------------------------
  // 页面渲染：Dashboard
  // --------------------------------------------------------
  const renderDashboard = () => {
    const todayRecs = useMemo(() => {
      let all = [];
      Object.keys(records).forEach(cat => {
        (records[cat]||[]).forEach(r => { if(r.createdAt.startsWith(todayStr())) all.push({...r, cat}); });
      });
      return all.sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    }, [records]);

    return (
      <div className="main-scroll px-6 page-enter" style={{'--theme-bg': 'var(--home-bg)', '--theme-p': 'var(--home-p)'}}>
        <div className="pt-16 mb-8">
          <p className="text-stone-400 text-xs mb-1 uppercase tracking-widest">{new Date().toLocaleDateString('zh-CN', {month:'long', day:'numeric', weekday:'short'})}</p>
          <h1 className="text-4xl mb-4 font-display text-gradient">今天也要认真生活</h1>
          
          {/* Today Summary */}
          <div className="card p-5 border-none" style={{background: 'linear-gradient(135deg, #FFF, #F6F4F0)'}}>
            <h3 className="text-sm mb-3 text-stone-500 font-medium">今日摘要</h3>
            <div className="text-sm space-y-2 text-stone-700">
              <p>🌙 昨晚睡了不错的觉</p>
              <p>🍱 记录了 {records.diet.filter(r=>r.createdAt.startsWith(todayStr())).length} 顿正餐</p>
              <p>🌿 放松了一会儿</p>
            </div>
          </div>
        </div>

        {/* Heatmap */}
        <div className="mb-8">
          <p className="text-[10px] text-stone-400 mb-3 uppercase tracking-widest px-1">生活留痕</p>
          <Heatmap />
        </div>

        {/* 模块网格 */}
        <div className="grid grid-cols-5 gap-3 mb-10">
          {MODULES.map(m => (
            <button key={m.id} onClick={()=>setPage(m.id)} className="flex flex-col items-center gap-2 p-3 rounded-2xl" style={{background: m.bg}}>
              <span className="text-xl">{m.emoji}</span>
              <span className="text-[10px] font-bold" style={{color:m.color}}>{m.name}</span>
            </button>
          ))}
        </div>

        {/* 最近瞬间 */}
        <div className="mb-10">
          <p className="text-[10px] text-stone-400 mb-4 uppercase tracking-widest px-1">最近瞬间</p>
          <div className="flex gap-3 overflow-x-auto pb-4 -mx-2 px-2 no-scrollbar">
             {todayRecs.filter(r=>r.images && r.images.length).slice(0,5).map(r => (
               <div key={r.id} className="w-32 aspect-square flex-shrink-0 rounded-2xl overflow-hidden shadow-sm" onClick={()=>setPreviewImg(r.images[0])}>
                 <img src={r.images[0]} className="w-full h-full object-cover" />
               </div>
             ))}
          </div>
        </div>

        {/* 今日时间轴 */}
        <div className="mb-10">
          <p className="text-[10px] text-stone-400 mb-6 uppercase tracking-widest px-1">今日行迹</p>
          <div className="space-y-6 relative border-l-2 border-stone-100 ml-2 pl-6">
            {todayRecs.map(r => (
              <div key={r.id} className="relative">
                <div className="absolute -left-[31px] top-1 w-2.5 h-2.5 rounded-full bg-white border-2 border-stone-200" />
                <div className="flex items-baseline gap-3 mb-1">
                  <span className="text-[10px] text-stone-300 font-medium">{fmtTime(r.createdAt)}</span>
                  <Tag color="var(--text-3)">{MODULES.find(m=>m.id===r.cat)?.name || '小记'}</Tag>
                </div>
                <p className="text-sm text-stone-600">{r.food || r.subject || r.title || r.content || '记录了一件小事'}</p>
                <ImageGrid images={r.images} />
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  // --------------------------------------------------------
  // 子页面渲染封装
  // --------------------------------------------------------
  const PageWrapper = ({ children }) => (
    <div className="main-scroll page-enter mood-header" style={{
      '--theme-bg': theme.bg, '--theme-p': theme.p
    }}>
      <div className="pt-14 px-6">
        <div className="flex items-center justify-between mb-8">
           <button onClick={()=>setPage('home')} className="text-stone-400">✕</button>
           <h2 className="text-lg font-bold">{theme.label}</h2>
           <div className="w-4" />
        </div>
        {children}
      </div>
    </div>
  );

  const renderModulePage = () => {
    // 简易渲染逻辑，保持结构
    const data = records[page] || [];
    return (
      <PageWrapper>
        <div className="space-y-4">
          <Btn fullWidth variant="soft" onClick={()=>window.scrollTo({top:9999, behavior:'smooth'})}>+ 开始记录</Btn>
          {data.map(r => (
            <div key={r.id} className="card p-5">
              <div className="flex justify-between items-start mb-2">
                <span className="text-[10px] text-stone-300">{fmtTime(r.createdAt)}</span>
                <button onClick={()=>deleteRecord(page, r.id)} className="text-stone-200 text-xs">删除</button>
              </div>
              <p className="text-sm">{r.content || r.food || r.subject || r.title}</p>
              <ImageGrid images={r.images} />
            </div>
          ))}
        </div>
      </PageWrapper>
    );
  };

  return (
    <div id="root" className="texture-bg">
      {page === 'home' ? renderDashboard() : renderModulePage()}

      {/* 底部 Dock */}
      <div className="ios-dock">
        <button onClick={()=>setPage('home')} style={{opacity: page==='home'?1:0.3}} className="p-2 text-xl">🏠</button>
        <button onClick={()=>setPage('sleep')} style={{opacity: page==='sleep'?1:0.3}} className="p-2 text-xl">🌙</button>
        <button onClick={()=>setPage('diet')} style={{opacity: page==='diet'?1:0.3}} className="p-2 text-xl">🍱</button>
        <button onClick={()=>setPage('leisure')} style={{opacity: page==='leisure'?1:0.3}} className="p-2 text-xl">🌿</button>
        <button onClick={()=>setPage('somethingbig')} style={{opacity: page==='somethingbig'?1:0.3}} className="p-2 text-xl">🌟</button>
      </div>

      {/* 图片全屏预览 */}
      {previewImg && (
        <div className="fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center p-4" onClick={()=>setPreviewImg(null)}>
           <img src={previewImg} className="max-w-full max-h-full rounded-2xl" />
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
